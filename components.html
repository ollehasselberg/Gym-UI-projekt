<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Components – Active Gym</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Component Showcase</h1>
        <nav>
            <a href="index.html">Hem</a>
            <a href="page2.html">Boka Pass</a>
            <button id="themeToggle">🌙</button>
        </nav>
    </header>

    <main>

        <!-- cards komponent -->
        <section class="components">
            <h2>Kort (Cards)</h2>

            <article class="card">
                <h4>Yoga</h4>
                <p>Instruktör: Anna</p>
                <p>Tid: 18:00</p>
            </article>

            <article class="card">
                <h4>Spinning</h4>
                <p>Instruktör: Erik</p>
                <p>Tid: 19:00</p>
            </article>

        </section>

        <!-- knappar komponent -->
        <section class="components">
            <h2>Knappar</h2>
            <button class="btn">Primär knapp</button>
            <button class="btn secondary">Sekundär knapp</button>
        </section>

        <!-- formulär komponent -->
        <section class="components">
            <h2>Formulär</h2>
            <form>
                <div class="form-group">
                    <label for="demoName">Namn</label>
                    <input type="text" id="demoName" placeholder="Skriv ditt namn">
                </div>

                <div class="form-group">
                    <label for="demoEmail">Email</label>
                    <input type="email" id="demoEmail" placeholder="Skriv din email">
                </div>

                <button class="btn">Skicka</button>
            </form>
        </section>

    </main>

    <footer>
        <p>© 2026 Active Gym</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
